# For vllm script, with -t option (tensor parallel size).
# bash .buildkite/lm-eval-harness/run-lm-eval-mmlupro-vllm-baseline.sh -m deepseek-ai/DeepSeek-R1 -b 128 -l 250 -f 5 -t 8
model_name: "deepseek-ai/DeepSeek-R1"
tasks:
- name: "mmlu_pro"
  metrics:
  - name: "exact_match,custom-extract"
    value: 0.80
limit: 100 # will run on 250 * 14 subjects = 3500 samples
num_fewshot: 5
trust_remote_code: True
rtol: 0.05
max_model_len: 32768
apply_chat_template: true
fewshot_as_multiturn: true
gen_kwargs: "temperature=0,top_p=1,top_k=0,max_gen_toks=5632,until=<|ENDANSWER|>"
vllm_args:
  gpu_memory_utilization: 0.90
  block_size: 1
env_vars:
  VLLM_WORKER_MULTIPROC_METHOD: spawn
  VLLM_ROCM_USE_AITER: 1
  VLLM_ROCM_USE_AITER_MLA: 1
  VLLM_ROCM_USE_AITER_MOE: 1
  HSA_NO_SCRATCH_RECLAIM: 1
  LLM_FUSED_MOE_CHUNK_SIZE: 32768
