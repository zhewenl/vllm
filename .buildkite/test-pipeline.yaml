# Minimal pipeline with fast EP checks on H200
steps:
- label: DeepSeek Benchmark (8 GPUs)
  gpu: h200
  num_gpus: 8
  command: VLLM_ALL2ALL_BACKEND=pplx VLLM_USE_DEEP_GEMM=1 vllm bench throughput --model deepseek-ai/DeepSeek-R1 --tensor-parallel-size 8 --input-len 1000 --output-len 1000 --num-prompts 50

- label: Expert Parallel & NIXL Tests
  gpu: h200
  num_gpus: 8
  working_dir: "/vllm-workspace/tests"
  commands:
    - VLLM_ALL2ALL_BACKEND=pplx VLLM_USE_DEEP_GEMM=1 pytest -v -s kernels/moe/test_pplx_moe.py
    - VLLM_ALL2ALL_BACKEND=deepep VLLM_USE_DEEP_GEMM=1 pytest -v -s kernels/moe/test_deepep_moe.py
    - VLLM_ALL2ALL_BACKEND=deepep VLLM_USE_DEEP_GEMM=1 pytest -v -s kernels/moe/test_deepep_deepgemm_moe.py
    - pytest -v -s v1/kv_connector/unit/test_nixl_connector.py
