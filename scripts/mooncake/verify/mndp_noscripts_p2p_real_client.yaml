# MooncakeStore real-client CPU-only validation — zero shell scripts.
#
# Layout (P2P, real-client variant):
#   pre_serve[0]   mooncake_master   (no HTTP metadata server — P2PHANDSHAKE peer discovery)
#                  No mooncake_client owner — the vLLM rank contributes its
#                  own CPU segment (global_segment_size > 0).
#   serving        plain `vllm serve` cmd — JSON --kv-transfer-config inlined.
#   post_serve     vllm-bench, then kill master via stored PID file.
#
# scripts/mooncake/mooncake_config_real_client.json holds:
#   mode=real-client, global_segment_size="4GB", enable_offload=false,
#   metadata_server=P2PHANDSHAKE.
#
# Notes on the vllm/bench config below
# ------------------------------------
# This yaml is tuned to deterministically exercise the CPU-tier read path
# (tier-log lines with memory_keys > 0, disk_keys = 0). Real production
# deployments should leave `--enable-prefix-caching` ON; that flag is
# deliberately disabled here so vllm's local PagedAttention cache cannot
# satisfy requests on its own — every load is forced through the Mooncake
# rank-segment pool. Knobs that make this work:
#   - `-dp 1`                     : one rank, no router fan-out
#   - `--no-enable-prefix-caching`: forces `num_computed_tokens=0` so
#                                   `MooncakeStoreScheduler.get_num_new_matched_tokens`
#                                   always sees `external > local` and fires loads
#   - `--num-gpu-blocks-override 256` + small bench prompts so Mooncake pool
#     retains keys beyond vllm's local capacity
#
# To validate the steady-state "real production" recipe (mode/topology/PUT
# path) instead of the CPU-read path, restore `--enable-prefix-caching`,
# `-dp 4`, larger prompts, etc. The PUT side and master topology will be
# exercised the same way; the GET side just won't fire because local cache
# covers the working set.
#
# Required on PATH: mooncake_master, vllm, nc.

model: Qwen/Qwen3-8B
mode: local
precheck: true
collect_env: true
router_port: auto
prometheus_port: auto

# -----------------------------------------------------------------------------
# 1) Start the Mooncake master (object-store metadata + eviction; no HTTP
#    metadata server, no -enable_offload since there's no disk tier).
# -----------------------------------------------------------------------------
pre_serve:
  - cmd: |
      bash -c '
        set -euo pipefail
        mkdir -p {log_dir}
        nohup mooncake_master \
          -rpc_port=50051 \
          -rpc_thread_num=4 \
          -default_kv_lease_ttl=30000 \
          -eviction_high_watermark_ratio=0.95 \
          -eviction_ratio=0.1 \
          -enable_metric_reporting=true \
          -metrics_port=9003 \
          -logtostderr \
          > {log_dir}/mooncake_master.log 2>&1 < /dev/null &
        MASTER_PID=$$!
        echo $$MASTER_PID > {log_dir}/mooncake_master.pid
        for _ in $$(seq 60); do
          nc -z 127.0.0.1 50051 && break
          kill -0 $$MASTER_PID 2>/dev/null || {
            echo "mooncake_master crashed during startup" >&2
            tail -n 40 {log_dir}/mooncake_master.log >&2 || true
            exit 1
          }
          sleep 0.5
        done
        echo "mooncake_master ready (pid=$$MASTER_PID, rpc=:50051)"
      '
    repo_path: /home/${USER}/repos/vllm-mooncake

# -----------------------------------------------------------------------------
# 2) Serving — vLLM ranks contribute their own CPU segments (real-client mode).
#    No owner process. enable_offload=false in JSON; tier-log will show only
#    memory_keys (never disk_keys).
# -----------------------------------------------------------------------------
serving:
  roles:
    - role: worker
      count: 1
      nodes_per_instance: 1
      gpus_per_node: 1
      base_port: 8100
      vllm_engine:
        repo_path: /home/${USER}/repos/vllm-mooncake
        cmd: >-
          vllm serve {model}
          --port {port}
          --trust-remote-code
          --load-format dummy
          --enforce-eager
          -dp 1
          --gpu-memory-utilization 0.4
          --num-gpu-blocks-override 256
          --max-model-len 4096
          --max-num-seqs 32
          --max-num-batched-tokens 4096
          --no-enable-prefix-caching
          --enable-chunked-prefill
          --disable-uvicorn-access-log
          --kv-transfer-config '{"kv_connector":"MooncakeStoreConnector","kv_role":"kv_both","kv_connector_extra_config":{"load_async":true,"enable_cross_layers_blocks":true}}'
        env:
          # Connection params for the vllm-side MooncakeStoreConfig.
          # mode=real-client + global_segment_size="4GB" + enable_offload=false
          # all live in the JSON. The JSON's "device_name" is set to the
          # GB200 4-NIC CSV (rocep139s0,rocep140s0,rocep195s0,rocep196s0);
          # edit it for your topology. No Python-side auto-discovery — if
          # device_name is empty the connector warns and Mooncake's C++
          # auto-select takes over.
          MOONCAKE_CONFIG_PATH: "/home/${USER}/repos/vllm-mooncake/scripts/mooncake/mooncake_config_real_client.json"
          # vLLM-side tier logging (expect memory_keys only, disk_keys=0).
          VLLM_MOONCAKE_STORE_TIER_LOG: "1"
          GLOG_v: "1"
          VLLM_USE_SIMPLE_KV_OFFLOAD: "1"
          # Timeouts.
          VLLM_ENGINE_READY_TIMEOUT_S: "3600"
          VLLM_RPC_TIMEOUT: "600000"
          VLLM_LOG_STATS_INTERVAL: "1"
          # UCX for MNNVL.
          UCX_MEMTYPE_CACHE: "n"
          UCX_MEMTYPE_REG_WHOLE: "n"
          UCX_TLS: "cuda_copy,cuda_ipc,tcp"
          UCX_CUDA_IPC_ENABLE_MNNVL: "y"
          UCX_RC_TIMEOUT: "5s"
          UCX_RC_RETRY_COUNT: "14"
          UCX_RC_RNR_TIMEOUT: "10ms"
          UCX_RC_RNR_RETRY_COUNT: "14"
          # Model cache.
          HF_HOME: /mnt/lustre/hf-models
          # NCCL for GB200 NVL72.
          NCCL_P2P_DISABLE: "0"
          NCCL_P2P_LEVEL: NVL
          NCCL_SOCKET_IFNAME: enp192s2
          NCCL_IB_HCA: "mlx5_1,mlx5_2,mlx5_3,mlx5_4"
          NCCL_NET_GDR_LEVEL: "5"
          NCCL_SHM_DISABLE: "1"
          NCCL_DEBUG: WARN
          NCCL_TIMEOUT: "1800"
          TORCH_NCCL_HEARTBEAT_TIMEOUT_SEC: "1800"
          GLOO_SOCKET_IFNAME: enp192s2
        health_check:
          url: "http://localhost:{port}/health"
          timeout_s: 3600
          poll_interval_s: 10

  router:
    repo_path: /home/${USER}/repos/router-internal
    cmd: >-
      cargo run --release --
      --policy round_robin
      --prometheus-port {prometheus_port}
      --host 0.0.0.0
      --port {router_port}
      --intra-node-data-parallel-size 1
      {worker_flags}
    health_check:
      url: http://localhost:{router_port}/health
      timeout_s: 300
      poll_interval_s: 5

  remote:
    launcher: slurm
    slurm:
      partition: normal
      time_limit: "12:00:00"
      grace_period_s: 120

# -----------------------------------------------------------------------------
# 3) Benchmark, then kill master via PID file we wrote earlier.
# -----------------------------------------------------------------------------
post_serve:
  - vmon: start
  - cmd: >-
      vllm-bench
      --backend openai-chat
      --base-url http://localhost:{router_port}
      --model {model}
      --dataset-name random
      --random-input-len 3000
      --random-output-len 100
      --num-prompts 50
      --multi-turn
      --multi-turn-num-turns 3
      --multi-turn-concurrency 8
      --multi-turn-delay-ms 500
      --multi-turn-prefix-global-ratio 0.1
      --multi-turn-prefix-conversation-ratio 0.8
      --percentile-metrics "ttft,tpot,itl,e2el"
      --result-dir {log_dir}
      --save-result
  - vmon: stop
  - cmd: |
      bash -c '
        PID_FILE={log_dir}/mooncake_master.pid
        if [[ -f $$PID_FILE ]]; then
          PID=$$(<$$PID_FILE)
          kill -TERM "$$PID" 2>/dev/null || true
          for _ in $$(seq 5); do kill -0 "$$PID" 2>/dev/null || break; sleep 1; done
          kill -KILL "$$PID" 2>/dev/null || true
          rm -f $$PID_FILE
        fi
        # Safety-net.
        pkill -u $USER -x mooncake_master 2>/dev/null || true
        true
      '
